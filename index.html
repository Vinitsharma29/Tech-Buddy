<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeLine Triage - Smart Hospital Queue System</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h1 class="title">LifeLine Triage</h1>
        <p class="subtitle">Smart Hospital Queue System (hackathon MVP)</p>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <h2>Patient Form</h2>
        <form id="patientForm" class="form">
          <div class="row">
            <label>
              Name
              <input id="name" type="text" placeholder="e.g., Asha" required />
            </label>

            <label>
              Age
              <input id="age" type="number" min="0" max="120" placeholder="e.g., 45" required />
            </label>
          </div>

          <div class="row">
            <fieldset class="symptomsField">
              <legend>Symptoms (select all that apply)</legend>
              <div class="checks">
                <label><input type="checkbox" name="symptoms" value="Chest Pain" /> Chest Pain</label>
                <label><input type="checkbox" name="symptoms" value="Fever" /> Fever</label>
                <label><input type="checkbox" name="symptoms" value="Breathing Difficulty" /> Breathing Difficulty</label>
                <label><input type="checkbox" name="symptoms" value="Injury" /> Injury</label>
                <label><input type="checkbox" name="symptoms" value="Headache" /> Headache</label>
              </div>
            </fieldset>
